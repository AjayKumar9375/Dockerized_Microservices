apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: dockerized-microservices
  labels:
    app.kubernetes.io/name: dockerized-microservices
type: Opaque
stringData:
  POSTGRES_USER: "app_user"
  POSTGRES_PASSWORD: "change_me"
  POSTGRES_DB: "app_db"
  DATABASE_URL: "postgresql://app_user:change_me@postgres:5432/app_db"
